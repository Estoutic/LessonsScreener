<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 12px;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h1 {
      font-size: 15px;
      margin-bottom: 10px;
      color: #fff;
    }
    .controls {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    button {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    #btn-start {
      background: #00b894;
      color: #fff;
    }
    #btn-stop {
      background: #e74c3c;
      color: #fff;
    }
    #btn-test {
      background: #636e72;
      color: #fff;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid #2d2d44;
    }
    .info-label {
      color: #888;
    }
    .status-idle { color: #888; }
    .status-running { color: #00b894; }
    .status-stopped { color: #fdcb6e; }
    .status-completed { color: #74b9ff; }
    .status-error { color: #e74c3c; }
    .logs-container {
      margin-top: 10px;
      background: #0f0f23;
      border-radius: 4px;
      padding: 6px;
      max-height: 180px;
      overflow-y: auto;
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 10px;
      line-height: 1.5;
    }
    .log-line {
      color: #b0b0cc;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>Screener</h1>

  <div class="controls">
    <button id="btn-start">Start</button>
    <button id="btn-stop" disabled>Stop</button>
    <button id="btn-test">Test</button>
  </div>

  <div class="info-row">
    <span class="info-label">Status</span>
    <span id="status" class="status-idle">idle</span>
  </div>
  <div class="info-row">
    <span class="info-label">Current page</span>
    <span id="page-count">0</span>
  </div>
  <div class="info-row">
    <span class="info-label">Captured</span>
    <span id="captured-count">0</span>
  </div>

  <div class="logs-container" id="logs">
    <div class="log-line">Ready</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
